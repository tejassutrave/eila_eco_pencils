apiVersion: v1
kind: Namespace
metadata:
  name: eila-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eila-web
  namespace: eila-production
  labels:
    app: eila-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eila-web
  template:
    metadata:
      labels:
        app: eila-web
    spec:
      containers:
        - name: nextjs-app
          # Replace this with your actual GHCR/DockerHub repository path
          image: ghcr.io/username/eila:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 1024Mi
            requests:
              cpu: "200m"
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: "production"
            # Bind live Supabase and payment secrets here
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eila-secrets
                  key: supabase-url
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: eila-secrets
                  key: supabase-anon-key
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: eila-secrets
                  key: razorpay-key-id
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: eila-secrets
                  key: razorpay-key-secret
          livenessProbe:
            httpGet:
              path: /api/v1/products
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/products
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eila-web-service
  namespace: eila-production
spec:
  selector:
    app: eila-web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eila-web-ingress
  namespace: eila-production
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - eilaecoproducts.com
      secretName: eila-tls-cert
  rules:
    - host: eilaecoproducts.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eila-web-service
                port:
                  number: 80
